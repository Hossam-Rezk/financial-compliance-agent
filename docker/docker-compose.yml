services:
  mongodb:
    image: mongo:7.0.34-jammy
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb:/data/db
    restart: always

    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always
    networks:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always
    networks:
      - backend

networks:
  backend: